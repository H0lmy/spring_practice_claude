spring.application.name=bookwishlist
server.port = 8080
# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/bookwishlist
spring.datasource.username=bookwishlist
spring.datasource.password=bookwishlist
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
jwt.secret=THIS_IS_A_LONG_DEVELOPMENT_SECRET_AT_LEAST_32_CHARS_LONG_OK_MORE_TO_BE_SAFE
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=604800000
