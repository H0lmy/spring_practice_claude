services:
  postgres:
    image: postgres:16
    container_name: bookwishlist-postgres
    environment:
      POSTGRES_DB: bookwishlist
      POSTGRES_USER: bookwishlist
      POSTGRES_PASSWORD: bookwishlist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: